<!DOCTYPE html>
<html>
    <head>
        <title>Calcolatrice</title>
        <script>
            function addizione(){
                var val1 = document.somma.num1.value
                var val2 = document.somma.num2.value
                document.somma.risultato.value=(parseInt(val1)+parseInt(val2))
            }
        </script>
    </head>
    <body>
        <form name="somma">
        <input type="text" name="num1" size="4">Numero 1<br>
        <input type="text" name="num2" size="4">Numero 2
        <input type="button" name="sommatore" size="4" onclick=addizione() value="clicca"><br>
        <input type="text" name="risultato" size="10">
        </form>
    </body>
</html>
